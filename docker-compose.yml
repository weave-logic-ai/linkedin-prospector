services:
  db:
    image: ruvnet/ruvector-postgres:latest
    container_name: ctox-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ctox}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-ctox}
    volumes:
      - ./data/db/init:/docker-entrypoint-initdb.d
      - ./data/drives/db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ctox} -d ${POSTGRES_DB:-ctox}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
      target: runner
    container_name: ctox-app
    ports:
      - "3750:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-ctox}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-ctox}
      NODE_ENV: production
      PDL_API_KEY: ${PDL_API_KEY:-}
      APOLLO_API_KEY: ${APOLLO_API_KEY:-}
      LUSHA_API_KEY: ${LUSHA_API_KEY:-}
      THEIRSTACK_API_KEY: ${THEIRSTACK_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ECC_CAUSAL_GRAPH: ${ECC_CAUSAL_GRAPH:-false}
      ECC_EXO_CHAIN: ${ECC_EXO_CHAIN:-false}
      ECC_IMPULSES: ${ECC_IMPULSES:-false}
      ECC_COGNITIVE_TICK: ${ECC_COGNITIVE_TICK:-false}
      ECC_CROSS_REFS: ${ECC_CROSS_REFS:-false}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

